<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Öğrenci</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.card{background:#fff;border-radius:16px;padding:28px 24px;max-width:480px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.badge{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;background:#E6F1FB;color:#185FA5;border-radius:20px;padding:4px 12px;margin-bottom:16px;}
.q-num{font-size:13px;color:#888;margin-bottom:6px;}
.q-text{font-size:17px;font-weight:600;color:#1a1a1a;line-height:1.5;margin-bottom:20px;}
.timer-wrap{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.timer-track{flex:1;height:6px;background:#f0f0f0;border-radius:10px;overflow:hidden;}
.timer-fill{height:100%;border-radius:10px;background:#378ADD;transition:width 1s linear;}
.timer-txt{font-size:13px;font-weight:500;color:#888;min-width:40px;text-align:right;}
.opts{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid #e8e8e8;border-radius:10px;cursor:pointer;font-size:15px;color:#1a1a1a;background:#fff;transition:all .15s;text-align:left;}
.opt:hover{border-color:#378ADD;background:#f0f7ff;}
.opt.selected{border-color:#378ADD;background:#E6F1FB;color:#0C447C;}
.opt.correct{border-color:#639922;background:#EAF3DE;color:#27500A;}
.opt.wrong{border-color:#A32D2D;background:#FCEBEB;color:#501313;}
.opt-letter{width:28px;height:28px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.opt.selected .opt-letter{background:#B5D4F4;color:#0C447C;}
.opt.correct .opt-letter{background:#C0DD97;color:#27500A;}
.opt.wrong .opt-letter{background:#F5C4B3;color:#993C1D;}
.btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-submit{background:#378ADD;color:#fff;}
.btn-submit:hover{background:#185FA5;}
.btn-submit:disabled{background:#ccc;cursor:not-allowed;}
.feedback{padding:12px 16px;border-radius:10px;font-size:14px;line-height:1.6;margin-bottom:16px;}
.feedback.correct{background:#EAF3DE;color:#27500A;border:1px solid #97C459;}
.feedback.wrong{background:#FCEBEB;color:#501313;border:1px solid #F09595;}
.screen{display:none;}
.screen.active{display:block;}
.waiting{text-align:center;padding:20px 0;}
.dot-anim{display:inline-flex;gap:6px;margin-top:12px;}
.dot-anim span{width:8px;height:8px;border-radius:50%;background:#378ADD;animation:bounce .8s infinite alternate;}
.dot-anim span:nth-child(2){animation-delay:.2s;}
.dot-anim span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{from{opacity:.3;transform:translateY(0)}to{opacity:1;transform:translateY(-6px)}}
.progress-dots{display:flex;gap:6px;margin-bottom:16px;}
.pdot{width:8px;height:8px;border-radius:50%;background:#e0e0e0;}
.pdot.done{background:#378ADD;} .pdot.current{background:#EF9F27;}
.result-icon{font-size:48px;margin-bottom:12px;}
.result-title{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:8px;}
.result-sub{font-size:15px;color:#666;margin-bottom:24px;}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.score-card{background:#f8f8f8;border-radius:10px;padding:14px;text-align:center;}
.score-val{font-size:28px;font-weight:700;color:#1a1a1a;}
.score-lbl{font-size:12px;color:#888;margin-top:2px;}
</style>
</head>
<body>
<div class="card">
  <div id="screen-waiting" class="screen active">
    <div class="waiting">
      <div class="badge" id="test-badge">Quiz</div>
      <div style="font-size:15px;font-weight:500;color:#1a1a1a;">Soru yükleniyor...</div>
      <div class="dot-anim"><span></span><span></span><span></span></div>
      <div style="font-size:13px;color:#888;margin-top:16px;">Öğretmen soruyu başlatana kadar bekleyin</div>
    </div>
  </div>

  <div id="screen-question" class="screen">
    <div class="badge" id="q-badge-s">Quiz</div>
    <div class="progress-dots" id="progress-dots"></div>
    <div class="q-num" id="q-num">Soru 1 / ?</div>
    <div class="q-text" id="q-text"></div>
    <div class="timer-wrap">
      <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
      <div class="timer-txt" id="timer-txt">10:00</div>
    </div>
    <div class="opts" id="opts"></div>
    <div class="feedback" id="feedback" style="display:none;"></div>
    <button class="btn btn-submit" id="btn-submit" onclick="submitAnswer()" disabled>Cevabı Gönder</button>
  </div>

  <div id="screen-result" class="screen">
    <div style="text-align:center;">
      <div class="result-icon" id="result-icon">🎉</div>
      <div class="result-title" id="result-title">Tebrikler!</div>
      <div class="result-sub">Quiz tamamlandı</div>
    </div>
    <div class="score-grid">
      <div class="score-card"><div class="score-val" id="res-correct" style="color:#3B6D11;">—</div><div class="score-lbl">Doğru</div></div>
      <div class="score-card"><div class="score-val" id="res-pct">—</div><div class="score-lbl">Başarı</div></div>
    </div>
    <button class="btn btn-submit" onclick="location.reload()">Tekrar Başla</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FIREBASE_URL = "https://quiz-sinif-add48-default-rtdb.europe-west1.firebasedatabase.app";
const app = initializeApp({ databaseURL: FIREBASE_URL }, "ogrenci");
const db = getDatabase(app);
const TIMER_SECONDS = 600;

const urlParams = new URLSearchParams(window.location.search);
let testId = urlParams.get('test');
let questions = [];
let studentId = 'student_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
let currentQ = -1;
let selectedOpt = null;
let submitted = false;
let timerInterval = null;
let timeLeft = TIMER_SECONDS;
let userAnswers = [];
let answered = {};

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Önce testId'yi ve soruları yükle
async function init() {
  // testId URL'de yoksa Firebase'den aktif testi bul
  if (!testId) {
    const snap = await get(ref(db, 'testId'));
    testId = snap.val();
  }
  if (testId) {
    const snap = await get(ref(db, `tests/${testId}`));
    const t = snap.val();
    if (t) {
      questions = t.questions ? Object.entries(t.questions).map(([,q]) => q) : [];
      document.getElementById('test-badge').textContent = t.name || 'Quiz';
      document.getElementById('q-badge-s').textContent = t.name || 'Quiz';
    }
  }
  set(ref(db, 'students/' + studentId), { name: 'Öğrenci', score: 0, answers: {} });
  listenForQuestion();
}

function listenForQuestion() {
  onValue(ref(db, 'currentQuestion'), async snap => {
    const qIdx = snap.val();
    if (qIdx === null || qIdx === undefined) return;

    // Yeni test başladıysa testId'yi güncelle
    const tidSnap = await get(ref(db, 'testId'));
    const newTestId = tidSnap.val();
    if (newTestId && newTestId !== testId) {
      testId = newTestId;
      const tSnap = await get(ref(db, `tests/${testId}`));
      const t = tSnap.val();
      if (t) {
        questions = t.questions ? Object.entries(t.questions).map(([,q]) => q) : [];
        answered = {}; userAnswers = [];
      }
    }

    if (qIdx === -1) { showResults(); return; }
    if (qIdx === 0 && currentQ > 0) { answered = {}; userAnswers = []; }
    if (qIdx !== currentQ) {
      currentQ = qIdx;
      submitted = false;
      selectedOpt = null;
      if (!answered[qIdx]) loadQuestion(qIdx);
    }
  });
}

function loadQuestion(idx) {
  if (!questions[idx]) return;
  const q = questions[idx];
  show('screen-question');
  document.getElementById('q-num').textContent = `Soru ${idx+1} / ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;

  const dots = document.getElementById('progress-dots');
  dots.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pdot' + (i < idx ? ' done' : i === idx ? ' current' : '');
    dots.appendChild(d);
  });

  const optsEl = document.getElementById('opts');
  optsEl.innerHTML = '';
  (q.opts||[]).forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${'ABCD'[i]}</span>${opt}`;
    btn.onclick = () => selectOpt(i);
    optsEl.appendChild(btn);
  });

  document.getElementById('feedback').style.display = 'none';
  document.getElementById('btn-submit').disabled = true;
  document.getElementById('btn-submit').textContent = 'Cevabı Gönder';
  startTimer();
}

function selectOpt(i) {
  if (submitted) return;
  selectedOpt = i;
  document.querySelectorAll('.opt').forEach((b, idx) => b.className = 'opt' + (idx===i?' selected':''));
  document.getElementById('btn-submit').disabled = false;
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = TIMER_SECONDS;
  updateTimer();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) { clearInterval(timerInterval); if (!submitted) autoSubmit(); }
  }, 1000);
}
function updateTimer() {
  const m = Math.floor(timeLeft/60), s = timeLeft%60;
  document.getElementById('timer-txt').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const pct = timeLeft/TIMER_SECONDS*100;
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct+'%';
  fill.style.background = pct>40?'#378ADD':pct>20?'#EF9F27':'#E24B4A';
}
function autoSubmit() { if (selectedOpt===null) selectedOpt=-1; submitAnswer(); }

window.submitAnswer = function() {
  if (submitted) return;
  submitted = true;
  answered[currentQ] = selectedOpt;
  clearInterval(timerInterval);
  const q = questions[currentQ];
  const isCorrect = selectedOpt === q.answer;
  document.querySelectorAll('.opt').forEach((b, i) => {
    if (i===q.answer) b.className='opt correct';
    else if (i===selectedOpt&&!isCorrect) b.className='opt wrong';
  });
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (isCorrect?'correct':'wrong');
  fb.textContent = isCorrect ? '✓ Doğru cevap!' : `✗ Yanlış. Doğru: ${'ABCD'[q.answer]}) ${(q.opts||[])[q.answer]||''}`;
  fb.style.display = 'block';
  document.getElementById('btn-submit').textContent = 'Gönderildi ✓';
  document.getElementById('btn-submit').disabled = true;
  userAnswers[currentQ] = isCorrect ? 1 : 0;
  set(ref(db, `students/${studentId}/answers/${currentQ}`), { selected: selectedOpt, correct: isCorrect?1:0 });
  set(ref(db, `votes/${currentQ}/${selectedOpt===-1?'skip':selectedOpt}/${studentId}`), true);
};

function showResults() {
  clearInterval(timerInterval);
  const correct = userAnswers.filter(v=>v===1).length;
  const pct = questions.length > 0 ? Math.round(correct/questions.length*100) : 0;
  document.getElementById('res-correct').textContent = correct+' / '+questions.length;
  document.getElementById('res-pct').textContent = pct+'%';
  document.getElementById('result-title').textContent = pct>=80?'Mükemmel!':pct>=60?'İyi iş!':'Tekrar çalışalım!';
  document.getElementById('result-icon').textContent = pct>=80?'🏆':pct>=60?'👍':'📚';
  show('screen-result');
}

init();
</script>
</body>
</html>
