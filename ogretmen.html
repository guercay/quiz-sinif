<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Öğretmen Paneli</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;padding:20px;}
.topbar{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:12px;padding:14px 20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.topbar-title{font-size:16px;font-weight:700;color:#1a1a1a;}
.topbar-sub{font-size:12px;color:#888;}
.grid{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start;}
@media(max-width:700px){.grid{grid-template-columns:1fr;}}
.panel{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.panel-title{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
.badge{display:inline-block;font-size:11px;font-weight:600;background:#E6F1FB;color:#185FA5;border-radius:20px;padding:3px 10px;margin-bottom:10px;}
.q-text{font-size:16px;font-weight:600;color:#1a1a1a;line-height:1.5;margin-bottom:16px;}
.timer-wrap{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.timer-track{flex:1;height:8px;background:#f0f0f0;border-radius:10px;overflow:hidden;}
.timer-fill{height:100%;border-radius:10px;background:#378ADD;transition:width 1s linear;}
.timer-txt{font-size:14px;font-weight:600;color:#555;min-width:44px;text-align:right;}
.chart-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.chart-lbl{font-size:14px;font-weight:600;width:20px;color:#555;flex-shrink:0;}
.bar-wrap{flex:1;height:34px;background:#f5f5f5;border-radius:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;min-width:2px;transition:width .5s ease;}
.bar-fill.correct{background:#C0DD97;}
.bar-fill.wrong{background:#F5C4B3;}
.bar-count{font-size:13px;font-weight:600;}
.bar-count.c{color:#27500A;} .bar-count.w{color:#993C1D;}
.feedback-box{background:#EAF3DE;border:1px solid #97C459;border-radius:8px;padding:10px 14px;font-size:13px;color:#27500A;margin-top:14px;line-height:1.5;}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-start{background:#378ADD;color:#fff;} .btn-start:hover{background:#185FA5;}
.btn-reveal{background:#EAF3DE;color:#27500A;border:1px solid #97C459;} .btn-reveal:hover{background:#C0DD97;}
.btn-next{background:#1a1a1a;color:#fff;} .btn-next:hover{background:#333;}
.btn-end{background:#FCEBEB;color:#A32D2D;border:1px solid #F09595;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.stat{background:#f8f8f8;border-radius:8px;padding:12px;text-align:center;}
.stat-val{font-size:24px;font-weight:700;color:#1a1a1a;}
.stat-lbl{font-size:11px;color:#888;margin-top:2px;}
.student-list{max-height:200px;overflow-y:auto;}
.student-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid #f0f0f0;font-size:13px;}
.q-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.q-dot{width:32px;height:32px;border-radius:8px;border:1.5px solid #e0e0e0;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#888;}
.q-dot.active{border-color:#378ADD;background:#E6F1FB;color:#0C447C;}
.q-dot.done{border-color:#639922;background:#EAF3DE;color:#27500A;}
.idle-msg{text-align:center;padding:40px 0;color:#888;}
.test-select-wrap{padding:20px;}
.test-btn{width:100%;padding:14px;border-radius:10px;border:1.5px solid #e8e8e8;background:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;text-align:left;transition:all .15s;}
.test-btn:hover{border-color:#378ADD;background:#E6F1FB;}
.test-btn .t-name{color:#1a1a1a;}
.test-btn .t-meta{font-size:12px;color:#888;font-weight:400;margin-top:2px;}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-title" id="topbar-title">Öğretmen Paneli</div>
    <div class="topbar-sub" id="topbar-sub">Quiz kontrol ekranı</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span style="font-size:13px;color:#888;">Katılımcı: <strong id="student-count">0</strong></span>
    <div id="conn-dot" style="width:10px;height:10px;border-radius:50%;background:#ccc;"></div>
  </div>
</div>

<div id="test-select-screen">
  <div class="panel">
    <div class="panel-title">Test Seç</div>
    <div id="test-select-list"><div style="text-align:center;color:#aaa;padding:40px;">Yükleniyor...</div></div>
  </div>
</div>

<div id="quiz-screen" style="display:none;">
<div class="grid">
  <div class="panel">
    <div class="panel-title">Aktif Soru</div>
    <div id="idle-msg" class="idle-msg">
      <div style="font-size:32px;margin-bottom:8px;">⏳</div>
      <div style="font-size:15px;font-weight:500;">Quizi başlatmak için butona basın</div>
    </div>
    <div id="question-panel" style="display:none;">
      <div class="badge" id="q-badge">Soru 1 / ?</div>
      <div class="q-text" id="q-text"></div>
      <div class="timer-wrap">
        <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
        <div class="timer-txt" id="timer-txt">10:00</div>
      </div>
      <div id="chart-bars"></div>
      <div id="answer-reveal" style="display:none;" class="feedback-box"></div>
      <div style="font-size:12px;color:#888;margin-top:8px;" id="vote-note"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-start" id="btn-start" onclick="startQuiz()">Quizi Başlat</button>
      <button class="btn btn-reveal" id="btn-reveal" onclick="revealAnswer()" disabled>Cevabı Göster</button>
      <button class="btn btn-next" id="btn-next" onclick="nextQuestion()" disabled>Sonraki →</button>
      <button class="btn btn-end" id="btn-end" onclick="endQuiz()" disabled>Bitir</button>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:16px;">
    <div class="panel">
      <div class="panel-title">İstatistikler</div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-val" id="stat-joined">0</div><div class="stat-lbl">Katıldı</div></div>
        <div class="stat"><div class="stat-val" id="stat-answered">0</div><div class="stat-lbl">Yanıtladı</div></div>
        <div class="stat"><div class="stat-val" id="stat-correct" style="color:#3B6D11;">0%</div><div class="stat-lbl">Doğru ort.</div></div>
      </div>
      <div class="q-nav" id="q-nav"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Öğrenciler</div>
      <div class="student-list" id="student-list"><div style="text-align:center;color:#aaa;font-size:13px;padding:20px;">Henüz katılımcı yok</div></div>
    </div>
  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FIREBASE_URL = "https://quiz-sinif-add48-default-rtdb.europe-west1.firebasedatabase.app";
const app = initializeApp({ databaseURL: FIREBASE_URL }, "ogretmen");
const db = getDatabase(app);
const TIMER_SECONDS = 600;

// URL'den test ID al
const urlParams = new URLSearchParams(window.location.search);
let testId = urlParams.get('test');

let questions = [];
let currentQ = -1;
let revealed = false;
let timerInterval = null;
let chartUpdateInterval = null;
let timeLeft = TIMER_SECONDS;
let students = {};
let votes = {};

document.getElementById('conn-dot').style.background = '#639922';

// Testleri yükle
async function loadTests() {
  const snap = await get(ref(db, 'tests'));
  const tests = snap.val() || {};
  if (testId && tests[testId]) {
    loadTest(testId, tests[testId]);
    return;
  }
  // Test seçim ekranı
  const list = document.getElementById('test-select-list');
  const keys = Object.keys(tests);
  if (!keys.length) {
    list.innerHTML = '<div style="text-align:center;color:#aaa;padding:40px;">Admin panelinden test oluşturun.</div>';
    return;
  }
  list.innerHTML = '';
  keys.forEach(id => {
    const t = tests[id];
    const qCount = t.questions ? Object.keys(t.questions).length : 0;
    const btn = document.createElement('button');
    btn.className = 'test-btn';
    btn.innerHTML = `<div class="t-name">${t.name}</div><div class="t-meta">${t.desc||''} · ${qCount} soru</div>`;
    btn.onclick = () => loadTest(id, t);
    list.appendChild(btn);
  });
}

function loadTest(id, t) {
  testId = id;
  questions = t.questions ? Object.entries(t.questions).map(([,q]) => q) : [];
  document.getElementById('topbar-title').textContent = t.name;
  document.getElementById('topbar-sub').textContent = `${questions.length} soru · Öğretmen Paneli`;
  document.getElementById('test-select-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  listenToData();
}

function listenToData() {
  onValue(ref(db, 'students'), snap => {
    students = snap.val() || {};
    updateStudentList();
  });
  onValue(ref(db, 'votes'), snap => {
    votes = snap.val() || {};
    if (currentQ >= 0) renderChart(currentQ);
    updateStats();
  });
}

function updateStudentList() {
  const list = document.getElementById('student-list');
  const keys = Object.keys(students);
  document.getElementById('student-count').textContent = keys.length;
  document.getElementById('stat-joined').textContent = keys.length;
  if (!keys.length) { list.innerHTML = '<div style="text-align:center;color:#aaa;font-size:13px;padding:20px;">Henüz katılımcı yok</div>'; return; }
  list.innerHTML = '';
  keys.forEach(k => {
    const s = students[k];
    const correct = s.answers ? Object.values(s.answers).filter(a => a.correct === 1).length : 0;
    const row = document.createElement('div');
    row.className = 'student-row';
    row.innerHTML = `<span style="color:#1a1a1a;font-weight:500;">${s.name||'Öğrenci'}</span><span style="color:#185FA5;font-weight:600;">${correct}/${questions.length}</span>`;
    list.appendChild(row);
  });
}

function updateStats() {
  document.getElementById('stat-joined').textContent = Object.keys(students).length;
  if (currentQ < 0) return;
  const q = questions[currentQ];
  const qVotes = votes[currentQ] || {};
  let total = 0, correct = 0;
  Object.keys(qVotes).forEach(oi => {
    const cnt = Object.keys(qVotes[oi]||{}).length;
    total += cnt;
    if (parseInt(oi) === q.answer) correct += cnt;
  });
  document.getElementById('stat-answered').textContent = total;
  document.getElementById('stat-correct').textContent = total > 0 ? Math.round(correct/total*100)+'%' : '0%';
}

function buildQNav() {
  const nav = document.getElementById('q-nav');
  nav.innerHTML = '';
  questions.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'q-dot' + (i === currentQ ? ' active' : i < currentQ ? ' done' : '');
    btn.textContent = i+1;
    nav.appendChild(btn);
  });
}

window.startQuiz = function() {
  remove(ref(db, 'votes'));
  remove(ref(db, 'students'));
  set(ref(db, 'currentQuestion'), 0);
  set(ref(db, 'testId'), testId);
  currentQ = 0; revealed = false;
  document.getElementById('idle-msg').style.display = 'none';
  document.getElementById('question-panel').style.display = 'block';
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-reveal').disabled = false;
  document.getElementById('btn-end').disabled = false;
  loadQuestion(0);
};

function loadQuestion(idx) {
  const q = questions[idx];
  revealed = false;
  document.getElementById('q-badge').textContent = `Soru ${idx+1} / ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('answer-reveal').style.display = 'none';
  document.getElementById('vote-note').textContent = '';
  document.getElementById('btn-reveal').disabled = false;
  document.getElementById('btn-next').disabled = true;
  document.getElementById('btn-next').textContent = idx === questions.length-1 ? 'Bitir →' : 'Sonraki →';
  document.getElementById('btn-next').onclick = idx === questions.length-1 ? endQuiz : nextQuestion;
  renderChart(idx); buildQNav();
  startTimer();
  chartUpdateInterval = setInterval(() => renderChart(currentQ), 2000);
}

function renderChart(idx) {
  const q = questions[idx];
  const qVotes = votes[idx] || {};
  let total = 0;
  const counts = (q.opts||[]).map((_, i) => { const c = Object.keys(qVotes[i]||{}).length; total += c; return c; });
  const container = document.getElementById('chart-bars');
  container.innerHTML = '';
  counts.forEach((count, i) => {
    const pct = total > 0 ? Math.round(count/total*100) : 0;
    const isCorrect = i === q.answer;
    const row = document.createElement('div');
    row.style.marginBottom = '8px';
    row.innerHTML = `
      <div class="chart-row">
        <span class="chart-lbl">${'ABCD'[i]}</span>
        <div class="bar-wrap"><div class="bar-fill ${isCorrect?'correct':'wrong'}" style="width:${Math.max(pct,0)}%"><span class="bar-count ${isCorrect?'c':'w'}">${pct>8?pct+'%':''}</span></div></div>
        <span style="font-size:12px;color:#888;min-width:40px;text-align:right;">${count} oy</span>
      </div>
      <div style="font-size:11px;color:#888;margin-left:30px;">${(q.opts||[])[i]||''}</div>`;
    container.appendChild(row);
  });
  document.getElementById('vote-note').textContent = `Toplam yanıt: ${total}`;
  updateStats();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = TIMER_SECONDS;
  updateTimerUI();
  timerInterval = setInterval(() => { timeLeft--; updateTimerUI(); if (timeLeft<=0) clearInterval(timerInterval); }, 1000);
}
function updateTimerUI() {
  const m = Math.floor(timeLeft/60), s = timeLeft%60;
  document.getElementById('timer-txt').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const pct = timeLeft/TIMER_SECONDS*100;
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct+'%';
  fill.style.background = pct>40?'#378ADD':pct>20?'#EF9F27':'#E24B4A';
}

window.revealAnswer = function() {
  if (revealed) return;
  revealed = true;
  clearInterval(timerInterval); clearInterval(chartUpdateInterval);
  renderChart(currentQ);
  const q = questions[currentQ];
  const box = document.getElementById('answer-reveal');
  box.textContent = `Doğru: ${'ABCD'[q.answer]} — ${(q.opts||[])[q.answer]||''}${q.explanation?'\n'+q.explanation:''}`;
  box.style.display = 'block';
  document.getElementById('btn-reveal').disabled = true;
  document.getElementById('btn-next').disabled = false;
};

window.nextQuestion = function() {
  clearInterval(chartUpdateInterval);
  currentQ++;
  set(ref(db, 'currentQuestion'), currentQ);
  loadQuestion(currentQ);
};

window.endQuiz = function() {
  clearInterval(timerInterval); clearInterval(chartUpdateInterval);
  set(ref(db, 'currentQuestion'), -1);
  document.getElementById('btn-next').disabled = true;
  document.getElementById('btn-reveal').disabled = true;
  document.getElementById('btn-end').disabled = true;
  document.getElementById('vote-note').textContent = 'Quiz tamamlandı. Öğrenciler sonuç ekranını görüyor.';
};

loadTests();
</script>
</body>
</html>
